<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Nested Parent Frame</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 12px; background: #f0f0f0; }
    a { margin-right: 8px; }
    iframe { border: 1px solid #999; width: 80%; height: 120px; }
  </style>
</head>
<body>
  <h3>中間フレーム（iframe の中の iframe）- 2つのリンク</h3>
  <div>
    <a href="https://example.com/mid-1">Mid Link 1</a>
    <a href="https://example.com/mid-2">Mid Link 2</a>
  </div>
  <iframe src="nested-child.html"></iframe>
</body>
</html>
